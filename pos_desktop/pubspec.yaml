name: yespos_desktop
description: YesPOS - Desktop Point of Sale Application for Uzbekistan
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # HTTP & API
  dio: ^5.4.0

  # State Management
  flutter_riverpod: ^2.4.9

  # Local Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.2

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1

  # Printing
  pdf: ^3.10.8
  printing: ^5.13.1

  # Date & Time
  intl: ^0.19.0

  # Desktop specific
  window_manager: ^0.3.8
  screen_retriever: ^0.2.1

  # Charts
  fl_chart: ^0.67.0

  # Utils
  uuid: ^4.3.3
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
